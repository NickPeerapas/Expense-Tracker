<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense Tracker</h1>
            <h2>Track your income and expenses</h2>
        </header>

        <section class="summary-card">
            <div class="balance-block">
                <h1>Balance :  <h1 id="balance">5000</h1></h1>
            </div>
            <div>
                <h2 class="income">Income : <span id="income">15000</span></h2>
                <h2 class="expense">Expense : <span id="expense">10000</span></h2>
            </div>
        </section>

        <section class="form-card">
            <h1>Add Transaction</h1>
            <form action="" id="form">
                <div class="input-group">
                    <label for="title">Title : </label>
                    <input type="text" name="title" id="title">
                </div>

                <div class="input-group">
                    <label for="amount">Amount : </label>
                    <input type="number" name="amount" id="amount">
                </div>

                <div class="input-group">
                    <label for="type">Type : </label>
                    <select name="type" id="type">
                        <option value="income" selected>Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>

                 <div class="input-group">
                    <label for="date">Date : </label>
                    <input type="date" name="date" id="date">
                </div>

                <button type="submit">Add Transaction</button>
            </form>
            <p id="error-message" class="not-show">Error Massage</p>
        </section>

        <section class="filter-bar">
            <h1>Filter : </h1>
            <div>
                <select name="type-filter" id="type-filter">
                    <option value="all" selected>All</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
        </section>

        <section class="transactions-list">
            <h1>Transactions</h1>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
